<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color">
    <link href="styles.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <title>Hype Scorer</title>
</head>
<body>
    <header>
        <h2 class="presented-title hot-orange">The BuzzMeter</h2>
        <h1 class="event-display-header">EVENT</h1>
        <h1 class="hype-header hot-orange">HYPE</h1>
        <h1 class="scorer-header">SCORER</h1>
    </header>
    <main>
        <p class="buying-message">Find out how hot a show really is before you buy.</p>
        <div class="form-container">
            <form id="search-event-form" method="GET">
                <div class="searchbox">
                    <span class="material-symbols-outlined">search</span>
                    <input 
                        aria-label="Search artist, team, or venue..."
                        type="search"
                        inputmode="search"
                        id="event-search" 
                        name="event-search" 
                        placeholder="What do you want to see live?"
                        required
                    >
                </div>
            </form>
        </div>
        <div class="loading-line"></div>
        <section>
            <div id="status-message"></div>
            <div id="event-container"></div>
        </section>
    </main>
    <div class="footer-wrapper">
        <footer>&copy 2026 Donovan Vernon All rights reserved.</footer>
    </div>
    <script src="index.js" defer></script>
</body>
</html>
